<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eby-Gold Superstores - Invoice Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
    
    body { 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 10px; 
        color: #1a202c; 
    }
 .container { 
        max-width: 800px; margin: 0 auto; 
        background: white; 
        padding: 15px; border-radius: 16px; 
        box-shadow: 0 8px 32px rgba(0,0,0,0.2); 
    }
 .login-screen { text-align: center; padding: 40px 20px; }
 .login-screen h1 { color: #0a2540; font-size: 2em; margin-bottom: 10px; }
 .login-screen p { color: #4a5568; margin-bottom: 30px; }
 .hidden { display: none!important; }
    
    h1 { color: #0a2540; text-align: center; margin-bottom: 25px; font-size: 1.8em; }
 .section { margin-bottom: 25px; padding: 15px; background: #f7fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
 .section-title { font-size: 1.1em; font-weight: 700; color: #0a2540; margin-bottom: 15px; border-bottom: 2px solid #d4af37; padding-bottom: 8px; }
 .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9em; color: #2d3748; }
    input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1em; }
    input:focus { border-color: #0a2540; outline: none; }
 .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
 .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; align-items: end; }
 .btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 1em; font-weight: 700; cursor: pointer; width: 100%; }
 .btn-primary { background: #0a2540; color: white; }
 .btn-secondary { background: #d4af37; color: #0a2540; }
 .btn-success { background: #25D366; color: white; } /* WHATSAPP GREEN */
 .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; } /* 3 buttons now */
    
    #previewArea { margin-top: 30px; background: white; padding: 20px; border-radius: 12px; border: 2px solid #0a2540; position: relative; overflow-x: auto; }
    #previewArea::before { /* LOGO WATERMARK */
        content: ''; position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -50%); width: 70%; height: 70%;
        background-repeat: no-repeat; background-position: center;
        background-size: contain; opacity: 0.08; z-index: 0; pointer-events: none;
    }
  .preview-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; } /* NEW BUTTONS HERE */
    
 .invoice-header { 
        display: flex; justify-content: space-between; align-items: flex-start; 
        margin-bottom: 25px; border-bottom: 3px solid #0a2540; padding-bottom: 15px; 
        flex-wrap: wrap; gap: 15px;
    }
 .logo-box { width: 100px; height: 100px; border: 2px dashed #cbd5e0; display: flex; align-items: center; justify-content: center; border-radius: 10px; overflow: hidden; background: white; cursor: pointer; font-size: 12px; text-align: center; }
 .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
 .company-info h2 { color: #0a2540; font-size: 1.5em; margin-bottom: 5px; font-weight: 900; word-break: break-word; }
 .invoice-meta { text-align: right; min-width: 120px; }
 .invoice-meta h3 { color: #0a2540; font-size: 1.3em; }
 .status-badge { display: inline-block; padding: 5px 12px; background: #e53e3e; color: white; border-radius: 20px; font-size: 0.8em; font-weight: 700; margin-top: 5px; }
    
    table { width: 100%; min-width: 550px; border-collapse: collapse; margin: 20px 0; position: relative; z-index: 1; }
    th { background: #0a2540; color: white; padding: 10px; text-align: left; font-weight: 800; border: 2px solid #0a2540; font-size: 0.9em; }
    td { padding: 10px; border: 2px solid #2d3748; font-size: 0.9em; }
 .sn-col { width: 50px; text-align: center; }
 .total-row { font-weight: 900; font-size: 1em; background: #fff9e6; }
 .signature-section { display: flex; justify-content: space-between; margin-top: 40px; padding-top: 20px; border-top: 2px solid #e2e8f0; flex-wrap: wrap; gap: 20px; }
 .signature-box { width: 45%; text-align: center; min-width: 150px; }
 .signature-line { border-bottom: 2px solid #2d3748; margin: 40px 0 5px 0; }
    
    @media print { body { background: white; }.no-print { display: none!important; }.container { box-shadow: none; border: none; } #previewArea { overflow-x: visible; }
    @media (max-width: 600px) {
      .grid-2,.grid-3,.btn-group,.preview-actions { grid-template-columns: 1fr; }
      .invoice-header { flex-direction: column; align-items: center; text-align: center; }
      .invoice-meta { text-align: center; }
      .company-info h2 { font-size: 1.3em; }
    }
</style>
</head>
<body>

<div class="container">
    <div id="loginScreen" class="login-screen">
        <h1>EBY-GOLD SUPERSTORES</h1>
        <p>Professional Invoice & Receipt Generator</p>
        <button class="btn btn-primary" onclick="login()">Enter Dashboard</button>
    </div>

    <div id="appScreen" class="hidden">
        <h1>Invoice Generator</h1>
        
        <div class="section no-print">
            <div class="section-title">Customer Details</div>
            <div class="grid-2">
                <div class="form-group"><label>Customer Name</label><input type="text" id="custName" placeholder="John Doe"></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="custPhone" placeholder="08012345678"></div>
            </div>
            <div class="form-group"><label>Address</label><input type="text" id="custAddress" placeholder="123 Market Street, Lagos"></div>
        </div>

        <div class="section no-print">
            <div class="section-title">Add Items</div>
            <div class="grid-3">
                <div class="form-group"><label>Item Name</label><input type="text" id="itemName" placeholder="Product name"></div>
                <div class="form-group"><label>Qty</label><input type="number" id="itemQty" value="1" min="1"></div>
                <div class="form-group"><label>Rate (₦)</label><input type="number" id="itemRate" placeholder="0"></div>
                <div class="form-group"><button class="btn btn-secondary" onclick="addItem()">Add Item</button></div>
            </div>
            <table id="itemsTable" class="hidden">
                <thead><tr><th class="sn-col">S/N</th><th>Item</th><th>Qty</th><th>Rate</th><th>Total</th><th class="no-print">Action</th></tr></thead>
                <tbody id="itemsBody"></tbody>
            </table>
        </div>

        <!-- MOVED BUTTONS: No Download/WhatsApp here anymore -->
        <div class="btn-group no-print">
            <button class="btn btn-primary" onclick="saveInvoice()">💾 Save</button>
            <button class="btn btn-secondary" onclick="generatePreview()">👁️ Preview</button>
            <button class="btn btn-primary" onclick="resetForm()">🔄 Reset</button>
        </div>

        <div id="previewArea" class="hidden">
            <div id="invoiceContent"></div>
            <!-- NEW: BUTTONS NOW SHOW HERE -->
            <div class="preview-actions no-print">
                <button class="btn btn-primary" onclick="downloadPDF()">⬇️ Download PDF</button>
                <button class="btn btn-success" onclick="sendToWhatsApp()">📲 Send to WhatsApp</button>
            </div>
        </div>
    </div>
</div>

<script>
    let items = [];
    let logoData = null;
    let lastGeneratedPDF = null; // To store PDF for WhatsApp

    function login() {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appScreen').classList.remove('hidden');
        loadInvoice();
    }

    function generateInvoiceNumber() { return 'EGS-' + Date.now().toString().slice(-6); }

    function addItem() {
        const name = document.getElementById('itemName').value;
        const qty = parseFloat(document.getElementById('itemQty').value);
        const rate = parseFloat(document.getElementById('itemRate').value);
        if (!name ||!qty ||!rate) { alert('Please fill all item fields'); return; }
        items.push({ name, qty, rate, total: qty * rate });
        renderItems();
        document.getElementById('itemName').value = '';
        document.getElementById('itemQty').value = '1';
        document.getElementById('itemRate').value = '';
    }

    function renderItems() {
        const tbody = document.getElementById('itemsBody');
        tbody.innerHTML = '';
        items.forEach((item, index) => {
            tbody.innerHTML += `<tr>
                <td class="sn-col">${index + 1}</td>
                <td>${item.name}</td><td>${item.qty}</td>
                <td>₦${item.rate.toLocaleString()}</td><td>₦${item.total.toLocaleString()}</td>
                <td class="no-print"><button onclick="deleteItem(${index})" style="color:red; border:none; background:none; cursor:pointer;">Delete</button></td>
            </tr>`;
        });
        document.getElementById('itemsTable').classList.remove('hidden');
    }

    function deleteItem(index) { items.splice(index, 1); renderItems(); }

    function generatePreview() {
        const custName = document.getElementById('custName').value || 'Walk-in Customer';
        let subtotal = items.reduce((sum, item) => sum + item.total, 0);
        let itemsHTML = items.map((item, index) => `<tr>
            <td class="sn-col">${index + 1}</td>
            <td>${item.name}</td><td>${item.qty}</td>
            <td>₦${item.rate.toLocaleString()}</td><td>₦${item.total.toLocaleString()}</td>
        </tr>`).join('');
        
        document.getElementById('invoiceContent').innerHTML = `
            <div class="invoice-header">
                <div><div class="logo-box" onclick="uploadLogo()">${logoData? `<img src="${logoData}">` : '<span>Upload Logo</span>'}</div></div>
                <div class="company-info"><h2>EBY-GOLD SUPERSTORES</h2><p>Your Trusted Shopping Partner</p></div>
                <div class="invoice-meta"><h3>INVOICE</h3><p><b>No:</b> ${generateInvoiceNumber()}</p><p><b>Date:</b> ${new Date().toLocaleDateString()}</p></div>
            </div>
            <p><b>Bill To:</b> ${custName}</p><p><b>Phone:</b> ${document.getElementById('custPhone').value}</p>
            <table><thead><tr><th class="sn-col">S/N</th><th>Item</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead><tbody>${itemsHTML}<tr class="total-row"><td colspan="4">GRAND TOTAL</td><td>₦${subtotal.toLocaleString()}</td></tr></tbody></table>
            <div class="signature-section"><div class="signature-box"><div class="signature-line"></div><p>Customer Signature</p></div><div class="signature-box"><div class="signature-line"></div><p>Authorized Signature</p></div></div>
        `;
        if (logoData) { document.getElementById('previewArea').style.backgroundImage = `url(${logoData})`; }
        document.getElementById('previewArea').classList.remove('hidden');
    }

    function uploadLogo() {
        const input = document.createElement('input');
        input.type = 'file'; input.accept = 'image/*';
        input.onchange = e => { const reader = new FileReader(); reader.onload = event => { logoData = event.target.result; generatePreview(); }; reader.readAsDataURL(e.target.files[0]); };
        input.click();
    }

    function generatePDFBlob() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(18); doc.setFont(undefined, 'bold');
        doc.text('EBY-GOLD SUPERSTORES', 14, 20);
        doc.setFontSize(11);
        doc.text(`Invoice No: ${generateInvoiceNumber()}`, 140, 20);
        doc.text(`Date: ${new Date().toLocaleDateString()}`, 140, 27);
        doc.text(`Customer: ${document.getElementById('custName').value}`, 14, 35);
        let tableData = items.map((item, index) => [(index+1).toString(), item.name, item.qty.toString(), `₦${item.rate.toLocaleString()}`, `₦${item.total.toLocaleString()}`]);
        doc.autoTable({
            startY: 45, head: [['S/N', 'Item', 'Qty', 'Rate', 'Total']], body: tableData,
            theme: 'grid', styles: { lineColor: [10, 37, 64], lineWidth: 0.5, fontSize: 10 },
            headStyles: { fillColor: [10, 37, 64], textColor: 255, fontStyle: 'bold' },
            columnStyles: { 0: { cellWidth: 15 }
        });
        let finalY = doc.lastAutoTable.finalY + 10;
        doc.setFontSize(12); doc.setFont(undefined, 'bold');
        doc.text(`GRAND TOTAL: ₦${items.reduce((s,i)=>s+i.total,0).toLocaleString()}`, 14, finalY);
        return doc;
    }

    function downloadPDF() {
        const doc = generatePDFBlob();
        doc.save(`EbyGold-Invoice-${Date.now()}.pdf`);
    }

    function sendToWhatsApp() {
        const doc = generatePDFBlob();
        const pdfBlob = doc.output('blob');
        const pdfUrl = URL.createObjectURL(pdfBlob);
        const fileName = `EbyGold-Invoice-${Date.now()}.pdf`;
        const custPhone = document.getElementById('custPhone').value;
        
        // Create download link first
        const a = document.createElement('a');
        a.href = pdfUrl;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        // Open WhatsApp with message
        let whatsappMsg = `Hello ${document.getElementById('custName').value}, \n\nPlease find your invoice attached from EBY-GOLD SUPERSTORES. \n\nThank you!`;
        let whatsappLink = `https://wa.me/${custPhone}?text=${encodeURIComponent(whatsappMsg)}`;
        
        if(custPhone){
            window.open(whatsappLink, '_blank');
            alert('PDF Downloaded! \n\n1. Select the PDF file in WhatsApp \n2. Send to customer');
        } else {
            alert('PDF Downloaded! Please attach the file manually in WhatsApp.');
        }
    }

    function saveInvoice() { 
        localStorage.setItem('ebyGoldInvoice', JSON.stringify({ items, logoData, custName: document.getElementById('custName').value, custPhone: document.getElementById('custPhone').value, custAddress: document.getElementById('custAddress').value })); 
        alert('Invoice Saved!'); 
    }
    function loadInvoice() { 
        const data = JSON.parse(localStorage.getItem('ebyGoldInvoice') || '{}'); 
        if(data.items){ items = data.items; logoData = data.logoData; renderItems(); 
            document.getElementById('custName').value = data.custName || '';
            document.getElementById('custPhone').value = data.custPhone || '';
            document.getElementById('custAddress').value = data.custAddress || '';
        }
    }
    function resetForm() { 
        if(confirm('Reset everything?')){ items = []; logoData = null; document.querySelectorAll('input').forEach(i => i.value = ''); renderItems(); document.getElementById('previewArea').classList.add('hidden'); } 
    }
</script>
</body>
  </html>
