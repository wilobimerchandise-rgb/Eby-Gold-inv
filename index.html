<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eby-Gold Superstores - Invoice Generator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
    
    body { 
        background: linear-gradient(135deg, #a8e6ff 0%, #dcedff 50%, #fff9e6 100%);
        padding: 15px; 
        color: #1a202c; 
        position: relative;
        overflow-x: hidden;
    }
    body::before { /* CLOUDS */
        content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: 
            radial-gradient(ellipse 200px 100px at 20% 20%, rgba(255,255,255,0.85) 0%, transparent 60%),
            radial-gradient(ellipse 250px 120px at 80% 30%, rgba(255,255,255,0.8) 0%, transparent 60%),
            radial-gradient(ellipse 180px 90px at 40% 70%, rgba(255,255,255,0.85) 0%, transparent 60%),
            radial-gradient(ellipse 220px 110px at 90% 80%, rgba(255,255,255,0.8) 0%, transparent 60%);
        z-index: -2; opacity: 0.7; pointer-events: none; /* FIXED */
    }
  .birds { /* BIRDS */
        position: fixed; top: 5%; width: 100%; height: 200px; z-index: -1;
        opacity: 0.35; pointer-events: none; /* FIXED */
    }
  .bird { position: absolute; width: 35px; height: 18px; }
  .bird svg { fill: #0a2540; stroke: #0a2540; stroke-width: 2; }
  .bird1 { top: 0; left: 5%; animation: fly 18s linear infinite; }
  .bird2 { top: 50px; left: 25%; animation: fly 22s linear infinite 3s; }
  .bird3 { top: 20px; left: 55%; animation: fly 20s linear infinite 6s; }
    @keyframes fly { 0% { transform: translateX(-100px); } 100% { transform: translateX(120vw); }

  .container { 
        max-width: 800px; margin: 0 auto; 
        background: rgba(255, 255, 255, 0.96); 
        padding: 25px; border-radius: 16px; 
        box-shadow: 0 8px 32px rgba(0,0,0,0.15); 
        position: relative; z-index: 10; /* MAKE SURE ITS ON TOP */
    }
  .login-screen { text-align: center; padding: 40px 20px; position: relative; z-index: 11; }
  .login-screen h1 { color: #0a2540; font-size: 2em; margin-bottom: 10px; }
  .login-screen p { color: #4a5568; margin-bottom: 30px; }
  .hidden { display: none!important; }
    
    h1 { color: #0a2540; text-align: center; margin-bottom: 25px; font-size: 1.8em; }
  .section { margin-bottom: 25px; padding: 20px; background: #f7fafc; border-radius: 12px; border: 1px solid #e2e8f0; }
  .section-title { font-size: 1.1em; font-weight: 700; color: #0a2540; margin-bottom: 15px; border-bottom: 2px solid #d4af37; padding-bottom: 8px; }
  .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9em; color: #2d3748; }
    input, select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1em; }
    input:focus { border-color: #0a2540; outline: none; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .grid-3 { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 10px; align-items: end; }
  .btn { padding: 12px 20px; border: none; border-radius: 8px; font-size: 1em; font-weight: 700; cursor: pointer; width: 100%; position: relative; z-index: 12; }
  .btn-primary { background: #0a2540; color: white; }
  .btn-secondary { background: #d4af37; color: #0a2540; }
  .btn-group { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }
    
    #previewArea { margin-top: 30px; background: white; padding: 30px; border-radius: 12px; border: 2px solid #0a2540; position: relative; overflow: hidden; }
  .invoice-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 25px; border-bottom: 3px solid #0a2540; padding-bottom: 15px; }
  .logo-box { width: 130px; height: 130px; border: 2px dashed #cbd5e0; display: flex; align-items: center; justify-content: center; border-radius: 10px; overflow: hidden; background: white; cursor: pointer; }
  .logo-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .company-info h2 { color: #0a2540; font-size: 1.8em; margin-bottom: 5px; font-weight: 900; }
  .invoice-meta { text-align: right; }
  .invoice-meta h3 { color: #0a2540; font-size: 1.5em; }
  .status-badge { display: inline-block; padding: 5px 12px; background: #e53e3e; color: white; border-radius: 20px; font-size: 0.8em; font-weight: 700; margin-top: 5px; }
    
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th { background: #0a2540; color: white; padding: 12px; text-align: left; font-weight: 800; border: 2px solid #0a2540; }
    td { padding: 12px; border: 2px solid #2d3748; }
  .total-row { font-weight: 900; font-size: 1.1em; background: #fff9e6; }
    
  .preview-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
    
    @media print { body { background: white; }.birds, body::before { display: none; }.no-print { display: none!important; }.container { box-shadow: none; border: none; }
    @media (max-width: 600px) {.grid-2,.grid-3,.btn-group,.preview-actions { grid-template-columns: 1fr; }
</style>
</head>
<body>

<div class="birds">
    <div class="bird bird1"><svg viewBox="0 0 100 50"><path d="M10 25 Q 30 5, 50 25 Q 70 45, 90 25"/></svg></div>
    <div class="bird bird2"><svg viewBox="0 0 100 50"><path d="M10 25 Q 30 5, 50 25 Q 70 45, 90 25"/></svg></div>
    <div class="bird bird3"><svg viewBox="0 0 100 50"><path d="M10 25 Q 30 5, 50 25 Q 70 45, 90 25"/></svg></div>
</div>

<div class="container">
    <div id="loginScreen" class="login-screen">
        <h1>EBY-GOLD SUPERSTORES</h1>
        <p>Professional Invoice & Receipt Generator</p>
        <button class="btn btn-primary" onclick="login()">Enter Dashboard</button>
    </div>

    <div id="appScreen" class="hidden">
        <h1>Invoice Generator</h1>
        <div class="section no-print">
            <div class="section-title">Customer Details</div>
            <div class="grid-2">
                <div class="form-group"><label>Customer Name</label><input type="text" id="custName"></div>
                <div class="form-group"><label>Phone Number</label><input type="tel" id="custPhone"></div>
            </div>
            <div class="form-group"><label>Address</label><input type="text" id="custAddress"></div>
        </div>
        <div class="section no-print">
            <div class="section-title">Add Items</div>
            <div class="grid-3">
                <div class="form-group"><label>Item Name</label><input type="text" id="itemName"></div>
                <div class="form-group"><label>Qty</label><input type="number" id="itemQty" value="1"></div>
                <div class="form-group"><label>Rate (₦)</label><input type="number" id="itemRate"></div>
                <div class="form-group"><button class="btn btn-secondary" onclick="addItem()">Add Item</button></div>
            </div>
            <table id="itemsTable" class="hidden"><thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Total</th><th class="no-print">Action</th></tr></thead><tbody id="itemsBody"></tbody></table>
        </div>
        <div class="btn-group no-print">
            <button class="btn btn-primary" onclick="saveInvoice()">💾 Save</button>
            <button class="btn btn-secondary" onclick="generatePreview()">👁️ Preview</button>
            <button class="btn btn-primary" onclick="resetForm()">🔄 Reset</button>
        </div>
        <div id="previewArea" class="hidden">
            <div id="invoiceContent"></div>
            <div class="preview-actions no-print">
                <button class="btn btn-primary" onclick="downloadPDF()">⬇️ Download PDF</button>
                <button class="btn btn-primary" onclick="window.print()">🖨️ Print</button>
            </div>
        </div>
    </div>
</div>

<script>
    let items = []; let logoData = null;
    function login() { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('appScreen').classList.remove('hidden'); }
    function addItem() {
        const name = document.getElementById('itemName').value; const qty = parseFloat(document.getElementById('itemQty').value); const rate = parseFloat(document.getElementById('itemRate').value);
        if (!name ||!qty ||!rate) { alert('Please fill all item fields'); return; }
        items.push({ name, qty, rate, total: qty * rate }); renderItems();
        document.getElementById('itemName').value = ''; document.getElementById('itemQty').value = '1'; document.getElementById('itemRate').value = '';
    }
    function renderItems() {
        const tbody = document.getElementById('itemsBody'); tbody.innerHTML = '';
        items.forEach((item, index) => { tbody.innerHTML += `<tr><td>${item.name}</td><td>${item.qty}</td><td>₦${item.rate.toLocaleString()}</td><td>₦${item.total.toLocaleString()}</td><td class="no-print"><button onclick="deleteItem(${index})" style="color:red; border:none; background:none; cursor:pointer;">Delete</button></td></tr>`; });
        document.getElementById('itemsTable').classList.remove('hidden');
    }
    function deleteItem(index) { items.splice(index, 1); renderItems(); }
    function generatePreview() {
        let subtotal = items.reduce((sum, item) => sum + item.total, 0);
        let itemsHTML = items.map(item => `<tr><td>${item.name}</td><td>${item.qty}</td><td>₦${item.rate.toLocaleString()}</td><td>₦${item.total.toLocaleString()}</td></tr>`).join('');
        document.getElementById('invoiceContent').innerHTML = `
            <div class="invoice-header">
                <div class="logo-box" onclick="uploadLogo()">${logoData? `<img src="${logoData}">` : '<span>Upload Logo</span>'}</div>
                <div class="company-info"><h2>EBY-GOLD SUPERSTORES</h2></div>
                <div class="invoice-meta"><h3>INVOICE</h3><p><b>Date:</b> ${new Date().toLocaleDateString()}</p><span class="status-badge">UNPAID</span></div>
            </div>
            <p><b>Bill To:</b> ${document.getElementById('custName').value}</p>
            <table><thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead><tbody>${itemsHTML}<tr class="total-row"><td colspan="3">GRAND TOTAL</td><td>₦${subtotal.toLocaleString()}</td></tr></tbody></table>`;
        document.getElementById('previewArea').classList.remove('hidden');
    }
    function uploadLogo() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*'; input.onchange = e => { const reader = new FileReader(); reader.onload = event => { logoData = event.target.result; generatePreview(); }; reader.readAsDataURL(e.target.files[0]); }; input.click(); }
    function downloadPDF() { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.text('EBY-GOLD SUPERSTORES', 14, 20); doc.save(`Invoice.pdf`); }
    function saveInvoice() { alert('Saved!'); }
    function resetForm() { items = []; document.querySelectorAll('input').forEach(i => i.value = ''); renderItems(); document.getElementById('previewArea').classList.add('hidden'); }
</script>
</body>
  </html>
