<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eby-Gold Superstores | Invoice App</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root {
    --primary: #0a2540;
    --gold: #d4af37;
    --bg: #f4f7fa;
    --card: #ffffff;
    --text: #1a202c;
}
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
body { background: var(--bg); color: var(--text); }

/* ...everything same until .logo-box... */

.logo-box { width: 130px; height: 130px; border: 2px dashed #ccc; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; overflow: hidden; font-weight: 800; }
.logo-box img { width: 100%; height: 100%; object-fit: cover; } /* CHANGED: cover instead of contain */

/* ...everything same until .invoice-footer... */

.invoice-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 40px; font-size: 12px; color: #64748b; border-top: 1px dashed #e2e8f0; font-weight: 700; font-style: italic; } /* CHANGED: bold + italics */
.footer-created-by { font-weight: 700; color: var(--primary); text-transform: capitalize; font-style: normal; }

/* ...rest of CSS same... */
</style>
</head>
<body>

<!-- ...all your HTML same... -->

<script>
let items = [];
let isSignUpMode = false;
let autoSaveTimeout = null;

// ...all your JS same until updatePreview()...

function updatePreview(){
    let docTypeVal = document.getElementById('docType').value;
    document.getElementById('previewName').innerText = document.getElementById('billedTo').value;
    document.getElementById('previewPhone').innerText = document.getElementById('phone').value;
    document.getElementById('previewAddress').innerText = document.getElementById('address').value;
    document.getElementById('previewDocType').innerText = docTypeVal;

    const badge = document.getElementById('statusBadge');
    if (docTypeVal === "Receipt") {
        badge.innerText = "PAID";
        badge.style.background = "#d1fae5";
        badge.style.color = "#065f46";
    } else {
        badge.innerText = "UNPAID";
        badge.style.background = "#fef3c7";
        badge.style.color = "#92400e";
    }

    let tableHTML = '<table class="items-table"><thead><tr><th>S/N</th><th>Items</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead><tbody>';
    items.forEach((it,i)=>{
        tableHTML += `<tr><td>${i+1}</td><td>${it.name}</td><td>${it.qty}</td><td>NGN ${it.rate.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td><td>NGN ${it.total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</td></tr>`
    });
    tableHTML += '</tbody></table>';
    document.getElementById('invoiceTable').innerHTML = tableHTML;

    let subtotal = items.reduce((a,b)=>a+b.total,0);
    let vat = document.getElementById('vat').checked? subtotal*0.075 : 0;
    let total = subtotal + vat;
    
    let totalsTableHTML = `
        <tbody>
            <tr><td>Subtotal</td><td>NGN ${subtotal.toFixed(2)}</td></tr>
            ${vat ? `<tr><td>VAT 7.5%</td><td>NGN ${vat.toFixed(2)}</td></tr>` : ''}
            <tr class="grand-total"><td>Total</td><td>NGN ${total.toFixed(2)}</td></tr>
        </tbody>
    `; // CHANGED: toFixed(2) for 2 decimal places
    document.getElementById('totalsTableHTML').innerHTML = totalsTableHTML;
    document.getElementById('amountInWords').innerText = numToWords(total);
    document.getElementById('footerCreator').innerText = getActiveUser();
}

// ...all your JS same until downloadPDF()...

function downloadPDF(){
    try {
        updatePreview();
        saveInvoice(true);
        
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const logoData = localStorage.getItem('eby_logo');
        const activeUser = getActiveUser();
        
        // ...pdf code same...
        
        let subtotal = items.reduce((a, b) => a + b.total, 0);
        let vat = document.getElementById('vat').checked ? subtotal * 0.075 : 0;
        let total = subtotal + vat;

        let totalsBody = [['Subtotal', "NGN " + subtotal.toFixed(2)]]; // CHANGED
        if(vat > 0) {
            totalsBody.push(['VAT 7.5%', "NGN " + vat.toFixed(2)]); // CHANGED
        }
        totalsBody.push(['Total', "NGN " + total.toFixed(2)]); // CHANGED

        // ...rest of pdf code same...
        
        let filename = (document.getElementById('invNo').innerText || 'invoice').replace('#','');
        doc.save(filename + '.pdf');
    } catch(err) {
        console.error("Error creating PDF document: ", err);
        alert("Error: " + err.message);
    }
}

// ...rest of JS same...
</script>
</body>
</html>
