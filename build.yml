name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova globally
        run: npm install -g cordova

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Cordova Project Wrapper
        run: |
          cordova create myapp com.ebygold.invoiceapp "Eby Gold"
          rm -rf myapp/www/*
          cp -r * myapp/www/ || true
          cd myapp
          cordova platform add android

      - name: Compile APK
        run: |
          cd myapp
          cordova build android --device

      - name: Upload Finished APK File
        uses: actions/upload-artifact@v4
        with:
          name: Eby-Gold-Offline-App
          path: myapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
